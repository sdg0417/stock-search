<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>주가 검색</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --up:       #e8321a;
      --up-bg:    rgba(232,50,26,0.10);
      --down:     #1763e8;
      --down-bg:  rgba(23,99,232,0.10);
      --flat:     #8896aa;
      --bg:       #0b0e15;
      --surface:  #141820;
      --surface2: #1c2130;
      --border:   #252d3e;
      --border2:  #2e3a50;
      --text:     #e8ecf2;
      --text2:    #8896aa;
      --text3:    #4f5e75;
      --accent:   #3b7eff;
      --accent2:  #5b8fff;
      --radius:   14px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 80px;
    }

    /* ── 헤더 ── */
    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), #6b5fff);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .subtitle {
      color: var(--text2);
      font-size: 0.82rem;
      margin-top: 4px;
    }

    /* ── 시장 상태 뱃지 ── */
    .market-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 999px;
      background: var(--surface2);
      border: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--text2);
      margin-top: 10px;
    }

    .market-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── 검색 ── */
    .search-wrap {
      width: 100%;
      max-width: 560px;
      margin-bottom: 16px;
    }

    .search-box {
      display: flex;
      gap: 8px;
      position: relative;
    }

    input {
      flex: 1;
      padding: 13px 16px;
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59,126,255,0.15);
    }

    input::placeholder { color: var(--text3); }

    .search-btn {
      padding: 13px 22px;
      border-radius: var(--radius);
      border: none;
      background: var(--accent);
      color: white;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .search-btn:hover  { background: var(--accent2); }
    .search-btn:active { transform: scale(0.97); }
    .search-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── 자동완성 ── */
    #suggest-box {
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: var(--surface);
      border: 1.5px solid var(--border2);
      border-radius: var(--radius);
      overflow: hidden;
      z-index: 200;
      display: none;
      box-shadow: 0 12px 32px rgba(0,0,0,0.5);
    }

    .suggest-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 11px 14px;
      cursor: pointer;
      transition: background 0.12s;
      gap: 12px;
      border-bottom: 1px solid var(--border);
    }

    .suggest-item:last-child { border-bottom: none; }
    .suggest-item:hover, .suggest-item.active { background: var(--surface2); }

    .suggest-left { display: flex; flex-direction: column; min-width: 0; }
    .suggest-name { font-size: 0.88rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .suggest-symbol { font-size: 0.74rem; color: var(--text2); margin-top: 1px; }

    .suggest-type {
      font-size: 0.69rem;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--surface2);
      color: var(--text3);
      border: 1px solid var(--border);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── 퀵칩 ── */
    .section-label {
      font-size: 0.72rem;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
      width: 100%;
      max-width: 560px;
    }

    .chips-group {
      width: 100%;
      max-width: 560px;
      margin-bottom: 10px;
    }

    .chips-label {
      font-size: 0.7rem;
      color: var(--text3);
      margin-bottom: 6px;
      letter-spacing: 0.04em;
    }

    .chips-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 20px;
    }

    .chip {
      padding: 5px 13px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text2);
      font-size: 0.79rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
    }

    .chip:hover {
      border-color: var(--accent);
      color: var(--accent2);
      background: rgba(59,126,255,0.08);
    }

    /* ── 스피너 & 에러 ── */
    .spinner {
      display: none;
      width: 22px; height: 22px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      margin: 28px auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #error-msg {
      color: #f87171;
      font-size: 0.85rem;
      text-align: center;
      margin-top: 6px;
      min-height: 20px;
    }

    /* ── 결과 카드 ── */
    .card {
      width: 100%;
      max-width: 560px;
      background: var(--surface);
      border-radius: 18px;
      border: 1.5px solid var(--border2);
      overflow: hidden;
      animation: fadeUp 0.3s ease;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* 카드 상단 컬러바 */
    .card-accent-bar {
      height: 3px;
      width: 100%;
    }

    .card-accent-bar.up   { background: linear-gradient(90deg, var(--up), #ff8a6a); }
    .card-accent-bar.down { background: linear-gradient(90deg, var(--down), #5eabff); }
    .card-accent-bar.flat { background: var(--border); }

    .card-body { padding: 22px 24px 20px; }

    /* 종목 헤더 */
    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 18px;
      gap: 12px;
    }

    .stock-info { min-width: 0; }

    .stock-name {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 240px;
    }

    .stock-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
      flex-wrap: wrap;
    }

    .stock-symbol-txt { font-size: 0.78rem; color: var(--text2); }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 5px;
      font-size: 0.68rem;
      font-weight: 600;
      border: 1px solid var(--border);
      color: var(--text3);
      background: var(--surface2);
    }

    .badge.kospi  { border-color: #2563eb44; color: #60a5fa; background: #1e3a6644; }
    .badge.kosdaq { border-color: #7c3aed44; color: #a78bfa; background: #3b1e6644; }
    .badge.us     { border-color: #059669a0; color: #34d399; background: #064e3b44; }
    .badge.crypto { border-color: #d97706a0; color: #fbbf24; background: #78350f44; }

    /* 가격 블록 */
    .price-block { text-align: right; flex-shrink: 0; }

    .price {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -1px;
      line-height: 1;
    }

    .price.up   { color: var(--up); }
    .price.down { color: var(--down); }
    .price.flat { color: var(--text); }

    .currency-txt {
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--text2);
      margin-left: 3px;
    }

    .change-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      margin-top: 5px;
    }

    .change-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 600;
    }

    .change-pill.up   { background: var(--up-bg);   color: var(--up); }
    .change-pill.down { background: var(--down-bg);  color: var(--down); }
    .change-pill.flat { background: var(--surface2); color: var(--flat); }

    /* 52주 레인지 바 */
    .range-section { margin-bottom: 18px; }

    .range-label-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
      color: var(--text2);
      margin-bottom: 5px;
    }

    .range-bar-wrap {
      position: relative;
      height: 5px;
      background: var(--surface2);
      border-radius: 999px;
      overflow: visible;
    }

    .range-fill {
      position: absolute;
      left: 0; top: 0; height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--down), var(--up));
    }

    .range-thumb {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 10px; height: 10px;
      border-radius: 50%;
      background: white;
      border: 2px solid var(--accent);
      box-shadow: 0 0 6px rgba(59,126,255,0.5);
    }

    /* 구분선 */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 18px 0;
    }

    /* 통계 그리드 */
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 14px 10px;
    }

    .stat-item { }

    .stat-label {
      display: block;
      font-size: 0.69rem;
      color: var(--text3);
      margin-bottom: 3px;
      letter-spacing: 0.03em;
    }

    .stat-val {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
    }

    .stat-val.up   { color: var(--up); }
    .stat-val.down { color: var(--down); }

    /* 타임스탬프 */
    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 24px;
      border-top: 1px solid var(--border);
      background: var(--surface2);
    }

    .timestamp {
      font-size: 0.72rem;
      color: var(--text3);
    }

    .data-source {
      font-size: 0.68rem;
      color: var(--text3);
    }

    /* ── 최근 검색 ── */
    .history-section {
      width: 100%;
      max-width: 560px;
      margin-top: 22px;
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .history-title {
      font-size: 0.72rem;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .history-clear {
      font-size: 0.7rem;
      color: var(--text3);
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
      transition: color 0.15s;
    }

    .history-clear:hover { color: #f87171; }

    .history-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .history-item {
      padding: 4px 11px;
      border-radius: 999px;
      background: var(--surface2);
      border: 1px solid var(--border);
      font-size: 0.79rem;
      color: var(--text2);
      cursor: pointer;
      transition: all 0.15s;
    }

    .history-item:hover {
      border-color: var(--accent);
      color: var(--accent2);
    }

    /* ── 반응형 ── */
    @media (max-width: 480px) {
      .stats { grid-template-columns: 1fr 1fr; }
      .price { font-size: 1.7rem; }
      .stock-name { max-width: 160px; }
      body { padding: 24px 12px 60px; }
    }
  </style>
</head>
<body>

<!-- 헤더 -->
<div class="header">
  <div class="logo-row">
    <div class="logo-icon">📈</div>
    <h1>주가 검색</h1>
  </div>
  <p class="subtitle">종목명 또는 티커 입력 · Yahoo Finance 실시간 데이터</p>
  <div class="market-status">
    <span class="market-dot"></span>
    <span id="market-time">시각 로딩 중...</span>
  </div>
</div>

<!-- 검색 -->
<div class="search-wrap">
  <div class="search-box">
    <input id="ticker-input" type="text"
      placeholder="삼성전자, 005930.KS, AAPL, NVDA..."
      maxlength="40" autocomplete="off" />
    <button class="search-btn" id="search-btn" onclick="search()">검색</button>
  </div>
  <div id="suggest-box"></div>
</div>

<!-- 퀵칩 -->
<div class="chips-group">
  <p class="chips-label">🇰🇷 국내 인기</p>
  <div class="chips-row">
    <span class="chip" onclick="quickSearch('005930.KS')">삼성전자</span>
    <span class="chip" onclick="quickSearch('000660.KS')">SK하이닉스</span>
    <span class="chip" onclick="quickSearch('035420.KS')">NAVER</span>
    <span class="chip" onclick="quickSearch('035720.KS')">카카오</span>
    <span class="chip" onclick="quickSearch('005380.KS')">현대차</span>
    <span class="chip" onclick="quickSearch('207940.KS')">삼성바이오</span>
    <span class="chip" onclick="quickSearch('373220.KS')">LG엔솔</span>
    <span class="chip" onclick="quickSearch('068270.KS')">셀트리온</span>
  </div>
  <p class="chips-label">🌐 해외·가상자산</p>
  <div class="chips-row">
    <span class="chip" onclick="quickSearch('NVDA')">NVIDIA</span>
    <span class="chip" onclick="quickSearch('AAPL')">Apple</span>
    <span class="chip" onclick="quickSearch('TSLA')">Tesla</span>
    <span class="chip" onclick="quickSearch('MSFT')">Microsoft</span>
    <span class="chip" onclick="quickSearch('BTC-USD')">비트코인</span>
    <span class="chip" onclick="quickSearch('ETH-USD')">이더리움</span>
  </div>
</div>

<div id="spinner" class="spinner"></div>
<div id="error-msg"></div>
<div id="result-card"></div>

<div id="history-section" class="history-section" style="display:none">
  <div class="history-header">
    <p class="history-title">최근 검색</p>
    <button class="history-clear" onclick="clearHistory()">전체 삭제</button>
  </div>
  <div id="history-list" class="history-list"></div>
</div>

<script>
  const input    = document.getElementById('ticker-input');
  const btn      = document.getElementById('search-btn');
  const spinner  = document.getElementById('spinner');
  const errorMsg = document.getElementById('error-msg');
  const card     = document.getElementById('result-card');
  const suggestBox = document.getElementById('suggest-box');

  let historyList = JSON.parse(localStorage.getItem('stock_history') || '[]');
  let suggestItems = [];
  let activeIdx = -1;
  let suggestTimer = null;

  // ── 시각 표시 ─────────────────────────────────────────────
  function updateClock() {
    const now = new Date();
    const timeStr = now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const dateStr = now.toLocaleDateString('ko-KR', { month: 'long', day: 'numeric', weekday: 'short' });
    document.getElementById('market-time').textContent = `${dateStr} ${timeStr}`;
  }
  updateClock();
  setInterval(updateClock, 1000);

  // ── 키보드 이벤트 ─────────────────────────────────────────
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter')     { closeSuggest(); search(); return; }
    if (e.key === 'ArrowDown') { e.preventDefault(); moveActive(1); return; }
    if (e.key === 'ArrowUp')   { e.preventDefault(); moveActive(-1); return; }
    if (e.key === 'Escape')    { closeSuggest(); return; }
  });

  input.addEventListener('input', () => {
    clearTimeout(suggestTimer);
    const q = input.value.trim();
    if (q.length < 1) { closeSuggest(); return; }
    suggestTimer = setTimeout(() => fetchSuggest(q), 250);
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.search-wrap')) closeSuggest();
  });

  renderHistory();

  // ── 한국 종목 이름→티커 매핑 ─────────────────────────────
  const KR_MAP = {

    '엔씨소프트':'036570.KS','엔씨':'036570.KS',
    '넷마블':'251270.KS','크래프톤':'259960.KS',
    '하이브':'352820.KS','빅히트':'352820.KS',
    'sm엔터테인먼트':'041510.KQ','jyp엔터테인먼트':'035900.KQ',
    '삼성바이오로직스':'207940.KS','삼성바이오':'207940.KS',
    '셀트리온':'068270.KS','셀트리온헬스케어':'091990.KQ',
    '유한양행':'000100.KS','한미약품':'128940.KS',
    'hlb':'028300.KQ','알테오젠':'196170.KQ',
    '한국타이어':'161390.KS','금호타이어':'073240.KS',
    'oci':'010060.KS','s-oil':'010950.KS','에쓰오일':'010950.KS',
    '애플':'AAPL','테슬라':'TSLA','엔비디아':'NVDA',
    '마이크로소프트':'MSFT','구글':'GOOGL','알파벳':'GOOGL',
    '아마존':'AMZN','메타':'META','넷플릭스':'NFLX',
    '팔란티어':'PLTR',
    '비트코인':'BTC-USD','이더리움':'ETH-USD','리플':'XRP-USD',
    '솔라나':'SOL-USD','도지코인':'DOGE-USD',
  };

  function hasKorean(s) { return /[\uac00-\ud7a3]/.test(s); }

  // ── API ───────────────────────────────────────────────────
  const API = {
    quote:  s => `/api/quote?symbol=${encodeURIComponent(s)}`,
    search: q => `/api/search?q=${encodeURIComponent(q)}`,
  };

  async function apiFetch(url) {
    const res = await fetch(url, { signal: AbortSignal.timeout(12000) });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  // ── 자동완성 ──────────────────────────────────────────────
  async function fetchSuggest(q) {
    try {
      const json = await apiFetch(API.search(q));
      suggestItems = (json?.quotes ?? []).filter(it => it.symbol);
      renderSuggest();
    } catch { /* 자동완성 실패 무시 */ }
  }

  function renderSuggest() {
    if (!suggestItems.length) { closeSuggest(); return; }
    activeIdx = -1;
    suggestBox.style.display = 'block';
    suggestBox.innerHTML = suggestItems.map((it, i) => {
      const name = it.longname || it.shortname || it.symbol;
      const typeMap = { EQUITY:'주식', ETF:'ETF', MUTUALFUND:'펀드', CRYPTOCURRENCY:'암호화폐', INDEX:'지수', FUTURE:'선물', CURRENCY:'통화' };
      const typeLabel = typeMap[it.quoteType] || it.quoteType || '';
      return `<div class="suggest-item" data-i="${i}" onmousedown="pickSuggest(${i})">
        <div class="suggest-left">
          <span class="suggest-name">${escHtml(name)}</span>
          <span class="suggest-symbol">${escHtml(it.symbol)} · ${escHtml(it.exchange||'')}</span>
        </div>
        <span class="suggest-type">${escHtml(typeLabel)}</span>
      </div>`;
    }).join('');
  }

  function moveActive(dir) {
    if (!suggestItems.length) return;
    activeIdx = Math.max(-1, Math.min(suggestItems.length - 1, activeIdx + dir));
    [...suggestBox.querySelectorAll('.suggest-item')].forEach((el, i) => el.classList.toggle('active', i === activeIdx));
    if (activeIdx >= 0) input.value = suggestItems[activeIdx].symbol;
  }

  function pickSuggest(i) {
    input.value = suggestItems[i].symbol;
    closeSuggest();
    search();
  }

  function closeSuggest() {
    suggestBox.style.display = 'none';
    suggestItems = [];
    activeIdx = -1;
  }

  // ── 검색 ──────────────────────────────────────────────────
  function quickSearch(symbol) { input.value = symbol; closeSuggest(); search(); }

  async function search() {
    const raw = input.value.trim();
    if (!raw) return;
    const symbol = raw.toUpperCase();

    card.innerHTML = '';
    errorMsg.textContent = '';
    spinner.style.display = 'block';
    btn.disabled = true;

    try {
      let resolvedSymbol = symbol;

      if (hasKorean(raw) || !/^[A-Z0-9.\-]+$/.test(symbol)) {
        const searchJson = await apiFetch(API.search(raw));
        const first = (searchJson?.quotes ?? []).find(q => q.symbol);
        if (first) resolvedSymbol = first.symbol;
      }

      let json = await apiFetch(API.quote(resolvedSymbol));
      let result = json?.chart?.result?.[0];

      if (!result && resolvedSymbol === symbol) {
        const searchJson = await apiFetch(API.search(raw));
        const first = (searchJson?.quotes ?? []).find(q => q.symbol);
        if (first) {
          resolvedSymbol = first.symbol;
          json = await apiFetch(API.quote(resolvedSymbol));
          result = json?.chart?.result?.[0];
        }
      }

      if (!result) throw new Error(`"${raw}" 에 해당하는 종목을 찾을 수 없습니다.`);

      input.value = resolvedSymbol;
      renderCard(result.meta, resolvedSymbol);
      addHistory(resolvedSymbol);

    } catch (e) {
      errorMsg.textContent = e.message || '오류가 발생했습니다.';
    } finally {
      spinner.style.display = 'none';
      btn.disabled = false;
    }
  }

  // ── 카드 렌더 ──────────────────────────────────────────────
  function renderCard(meta, symbol) {
    const price     = meta.regularMarketPrice ?? 0;
    const prev      = meta.chartPreviousClose ?? meta.previousClose ?? price;
    const change    = price - prev;
    const changePct = prev ? (change / prev) * 100 : 0;
    const currency  = meta.currency ?? 'USD';
    const name      = meta.longName || meta.shortName || symbol;
    const exchange  = meta.fullExchangeName || meta.exchangeName || '';
    const dayHigh   = meta.regularMarketDayHigh;
    const dayLow    = meta.regularMarketDayLow;
    const open      = meta.regularMarketOpen;
    const vol       = meta.regularMarketVolume;
    const cap52H    = meta.fiftyTwoWeekHigh;
    const cap52L    = meta.fiftyTwoWeekLow;
    const mktCap    = meta.marketCap;

    const dir   = change > 0 ? 'up' : change < 0 ? 'down' : 'flat';
    const arrow = change > 0 ? '▲' : change < 0 ? '▼' : '─';
    const sign  = change > 0 ? '+' : '';

    const isKRX    = symbol.endsWith('.KS') || symbol.endsWith('.KQ');
    const isCrypto = symbol.endsWith('-USD') || symbol.endsWith('-KRW');
    const isUS     = !isKRX && !isCrypto;

    // 52주 레인지 %
    let rangePct = 50;
    if (cap52H != null && cap52L != null && cap52H > cap52L) {
      rangePct = Math.round(((price - cap52L) / (cap52H - cap52L)) * 100);
      rangePct = Math.max(2, Math.min(98, rangePct));
    }

    // 거래소 뱃지
    let badgeClass = 'badge';
    let badgeText  = exchange;
    if (symbol.endsWith('.KS'))  { badgeClass += ' kospi';  badgeText = 'KOSPI'; }
    else if (symbol.endsWith('.KQ')) { badgeClass += ' kosdaq'; badgeText = 'KOSDAQ'; }
    else if (isCrypto)           { badgeClass += ' crypto'; badgeText = '암호화폐'; }
    else if (isUS)               { badgeClass += ' us';     badgeText = exchange || 'US'; }

    const fmt    = (n, d=2) => n != null ? n.toLocaleString('ko-KR', {minimumFractionDigits:d, maximumFractionDigits:d}) : '-';
    const fmtVol = n => {
      if (n == null) return '-';
      if (n >= 1e8) return (n/1e8).toFixed(1) + '억주';
      if (n >= 1e4) return (n/1e4).toFixed(0) + '만주';
      return n.toLocaleString() + '주';
    };
    const fmtCap = n => {
      if (n == null) return '-';
      if (n >= 1e12) return (n/1e12).toFixed(2) + '조';
      if (n >= 1e8)  return (n/1e8).toFixed(0) + '억';
      if (n >= 1e6)  return (n/1e6).toFixed(1) + 'M';
      return n.toLocaleString();
    };

    const now = new Date().toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    const today = new Date().toLocaleDateString('ko-KR', {month:'long', day:'numeric'});

    // KRX는 소수점 없이, 암호화폐는 더 많은 소수점
    const priceDec = isCrypto ? (price < 1 ? 6 : 2) : isKRX ? 0 : 2;
    const changeDec = isCrypto ? (price < 1 ? 6 : 2) : isKRX ? 0 : 2;

    card.innerHTML = `
      <div class="card">
        <div class="card-accent-bar ${dir}"></div>
        <div class="card-body">
          <div class="card-top">
            <div class="stock-info">
              <div class="stock-name">${escHtml(name)}</div>
              <div class="stock-meta">
                <span class="stock-symbol-txt">${escHtml(symbol)}</span>
                <span class="${badgeClass}">${escHtml(badgeText)}</span>
              </div>
            </div>
            <div class="price-block">
              <div class="price ${dir}">${fmt(price, priceDec)}<span class="currency-txt">${escHtml(currency)}</span></div>
              <div class="change-row">
                <span class="change-pill ${dir}">${arrow} ${fmt(Math.abs(change), changeDec)} (${sign}${changePct.toFixed(2)}%)</span>
              </div>
            </div>
          </div>

          ${(cap52H != null && cap52L != null) ? `
          <div class="range-section">
            <div class="range-label-row">
              <span>52주 저가 ${fmt(cap52L, priceDec)}</span>
              <span style="color:var(--text3)">현재가 위치 ${rangePct}%</span>
              <span>52주 고가 ${fmt(cap52H, priceDec)}</span>
            </div>
            <div class="range-bar-wrap">
              <div class="range-fill" style="width:${rangePct}%"></div>
              <div class="range-thumb" style="left:${rangePct}%"></div>
            </div>
          </div>
          ` : ''}

          <div class="divider"></div>

          <div class="stats">
            <div class="stat-item">
              <span class="stat-label">시가</span>
              <span class="stat-val">${fmt(open, priceDec)}</span>
            </div>
            <div class="stat-item">
              <span class="stat-label">전일 종가</span>
              <span class="stat-val">${fmt(prev, priceDec)}</span>
            </div>
            <div class="stat-item">
              <span class="stat-label">거래량</span>
              <span class="stat-val">${fmtVol(vol)}</span>
            </div>
            <div class="stat-item">
              <span class="stat-label">당일 고가</span>
              <span class="stat-val up">${fmt(dayHigh, priceDec)}</span>
            </div>
            <div class="stat-item">
              <span class="stat-label">당일 저가</span>
              <span class="stat-val down">${fmt(dayLow, priceDec)}</span>
            </div>
            <div class="stat-item">
              <span class="stat-label">시가총액</span>
              <span class="stat-val">${fmtCap(mktCap)}</span>
            </div>
          </div>
        </div>
        <div class="card-footer">
          <span class="timestamp">${today} ${now} 기준</span>
          <span class="data-source">Yahoo Finance</span>
        </div>
      </div>`;
  }

  function escHtml(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── 검색 히스토리 ─────────────────────────────────────────
  function addHistory(symbol) {
    historyList = [symbol, ...historyList.filter(s => s !== symbol)].slice(0, 10);
    localStorage.setItem('stock_history', JSON.stringify(historyList));
    renderHistory();
  }

  function clearHistory() {
    historyList = [];
    localStorage.removeItem('stock_history');
    renderHistory();
  }

  function renderHistory() {
    const section = document.getElementById('history-section');
    const list    = document.getElementById('history-list');
    if (!historyList.length) { section.style.display = 'none'; return; }
    section.style.display = 'block';
    list.innerHTML = historyList.map(s =>
      `<span class="history-item" onclick="quickSearch('${escHtml(s)}')">${escHtml(s)}</span>`
    ).join('');
  }
</script>
</body>
</html>
