
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>주가 검색</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: #64748b;
      font-size: 0.9rem;
      margin-bottom: 32px;
    }

    .search-box {
      display: flex;
      gap: 8px;
      width: 100%;
      max-width: 480px;
      margin-bottom: 24px;
    }

    input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid #1e293b;
      background: #1e293b;
      color: #e2e8f0;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #60a5fa; }
    input::placeholder { color: #475569; }

    button {
      padding: 12px 20px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #3b82f6, #6d28d9);
      color: white;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }

    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .quick-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      max-width: 480px;
      width: 100%;
      margin-bottom: 32px;
    }

    .chip {
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid #1e293b;
      background: #1e293b;
      color: #94a3b8;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .chip:hover {
      border-color: #60a5fa;
      color: #60a5fa;
    }

    .card {
      width: 100%;
      max-width: 480px;
      background: #1e293b;
      border-radius: 16px;
      padding: 24px;
      border: 1px solid #2d3748;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
    }

    .stock-name { font-size: 1.1rem; font-weight: 600; color: #e2e8f0; }
    .stock-symbol { font-size: 0.82rem; color: #64748b; margin-top: 2px; }

    .price-block { text-align: right; }
    .price {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .change {
      font-size: 0.9rem;
      font-weight: 500;
      margin-top: 2px;
    }

    .up   { color: #34d399; }
    .down { color: #f87171; }
    .flat { color: #94a3b8; }

    .divider {
      height: 1px;
      background: #2d3748;
      margin: 20px 0;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .stat-item label {
      display: block;
      font-size: 0.75rem;
      color: #64748b;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stat-item span {
      font-size: 0.95rem;
      font-weight: 500;
      color: #cbd5e1;
    }

    .market-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 600;
      background: #0f172a;
      color: #94a3b8;
      border: 1px solid #2d3748;
    }

    .timestamp {
      text-align: center;
      font-size: 0.75rem;
      color: #475569;
      margin-top: 16px;
    }

    #error-msg {
      color: #f87171;
      font-size: 0.88rem;
      text-align: center;
      margin-top: 8px;
    }

    .spinner {
      display: none;
      width: 20px; height: 20px;
      border: 3px solid #2d3748;
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 24px auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .history-section {
      width: 100%;
      max-width: 480px;
      margin-top: 24px;
    }

    .history-title {
      font-size: 0.8rem;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }

    .history-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .history-item {
      padding: 5px 12px;
      border-radius: 999px;
      background: #0f172a;
      border: 1px solid #1e293b;
      font-size: 0.82rem;
      color: #94a3b8;
      cursor: pointer;
      transition: all 0.2s;
    }

    .history-item:hover {
      border-color: #3b82f6;
      color: #60a5fa;
    }

    #suggest-box {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 60px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      overflow: hidden;
      z-index: 100;
      display: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    .suggest-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      cursor: pointer;
      transition: background 0.15s;
      gap: 12px;
    }

    .suggest-item:hover, .suggest-item.active {
      background: #0f172a;
    }

    .suggest-left { display: flex; flex-direction: column; min-width: 0; }
    .suggest-name { font-size: 0.88rem; color: #e2e8f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .suggest-symbol { font-size: 0.75rem; color: #64748b; }
    .suggest-type {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 999px;
      background: #0f172a;
      color: #64748b;
      border: 1px solid #2d3748;
      white-space: nowrap;
      flex-shrink: 0;

    el.addEventListener('click', () => quickSearch(el.dataset.symbol));
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { closeSuggest(); search(); return; }
    if (e.key === 'ArrowDown') { e.preventDefault(); moveActive(1); return; }
    if (e.key === 'ArrowUp')   { e.preventDefault(); moveActive(-1); return; }
    if (e.key === 'Escape')    { closeSuggest(); return; }
  });

  input.addEventListener('input', () => {
    clearTimeout(suggestTimer);
    const q = input.value.trim();
    if (q.length < 1) { closeSuggest(); return; }
    suggestTimer = setTimeout(() => fetchSuggest(q), 250);

    if (!e.target.closest('.search-box')) closeSuggest();
  });

  function hasKorean(s) { return /[\uac00-\ud7a3]/.test(s); }

  function lookupKrMap(q) {
    const key = q.toLowerCase().replace(/\s+/g, '');
    if (KR_MAP[key]) return KR_MAP[key];
    for (const [k, v] of Object.entries(KR_MAP)) {
      if (k === key || k.includes(key) || key.includes(k)) return v;
    }
    return null;
  }

  // ── API 엔드포인트 설정 ──────────────────────────────────────
  // [F-2] IS_LOCAL 분기 제거 — 항상 /api/ 경로 사용
  // 로컬(localhost)에서는 server.py가, 배포 환경에서는 Vercel serverless 함수가 처리
  const API = {
    quote:  symbol => `/api/quote/${encodeURIComponent(symbol)}`,
    search: q      => `/api/search?q=${encodeURIComponent(q)}`,
  };

  // [I-2] AbortSignal.timeout() 호환성 문제 해결 — AbortController + setTimeout 사용
  function fetchWithTimeout(url, ms = 8000) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), ms);
    return fetch(url, { signal: controller.signal })
      .finally(() => clearTimeout(timer));
  }

  async function apiFetch(url) {
    const res = await fetchWithTimeout(url, 8000);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  async function fetchSuggest(q) {
    try {
      if (hasKorean(q)) {
        const key = q.toLowerCase().replace(/\s+/g, '');
        const seen = new Set();
        const matches = Object.entries(KR_MAP)
          .filter(([k, v]) => { if (seen.has(v)) return false; if (k.includes(key) || key.includes(k)) { seen.add(v); return true; } return false; })
          .map(([name, sym]) => ({ symbol: sym, longname: name, quoteType: 'EQUITY', exchange: sym.endsWith('.KS') ? 'KSE' : sym.endsWith('.KQ') ? 'KOSDAQ' : 'US' }));
        suggestItems = matches.slice(0, 8);
        renderSuggest();
        return;
      }
      const json = await apiFetch(API.search(q));
      suggestItems = (json?.quotes ?? []).filter(it => it.symbol);
      renderSuggest();
    } catch { /* 자동완성 실패는 무시 */ }
  }

  function renderSuggest() {
    if (!suggestItems.length) { closeSuggest(); return; }
    activeIdx = -1;
    suggestBox.style.display = 'block';
    // [C-1] suggest-item도 data-i + addEventListener로 처리
    suggestBox.innerHTML = suggestItems.map((it, i) => {
      const name = it.longname || it.shortname || it.symbol;
      const typeLabel = { EQUITY:'주식', ETF:'ETF', MUTUALFUND:'펀드', CRYPTOCURRENCY:'암호화폐', INDEX:'지수', FUTURE:'선물', CURRENCY:'통화' }[it.quoteType] || it.quoteType || '';
      return `<div class="suggest-item" data-i="${i}">
        <div class="suggest-left">
          <span class="suggest-name">${escHtml(name)}</span>
          <span class="suggest-symbol">${escHtml(it.symbol)} · ${escHtml(it.exchange||'')}</span>
        </div>
        <span class="suggest-type">${escHtml(typeLabel)}</span>
      </div>`;
    }).join('');

    suggestBox.querySelectorAll('.suggest-item').forEach(el => {
      el.addEventListener('mousedown', () => pickSuggest(Number(el.dataset.i)));
    });
  }

  function moveActive(dir) {
    if (!suggestItems.length) return;
    activeIdx = Math.max(-1, Math.min(suggestItems.length - 1, activeIdx + dir));
    [...suggestBox.querySelectorAll('.suggest-item')].forEach((el, i) => el.classList.toggle('active', i === activeIdx));
    if (activeIdx >= 0) input.value = suggestItems[activeIdx].symbol;
  }

  function pickSuggest(i) {
    input.value = suggestItems[i].symbol;
    closeSuggest();
    search();
  }

  function closeSuggest() {
    suggestBox.style.display = 'none';
    suggestItems = [];
    activeIdx = -1;
  }

  // ── 검색 ──────────────────────────────────────────────────
  function quickSearch(symbol) {
    input.value = symbol;
    closeSuggest();
    search();
  }

  async function search() {
    const raw = input.value.trim();
    if (!raw) return;
    const symbol = raw.toUpperCase();

    card.innerHTML = '';
    errorMsg.textContent = '';
    spinner.style.display = 'block';
    btn.disabled = true;

    try {
      let resolvedSymbol = symbol;

      const krMatch = lookupKrMap(raw);
      if (krMatch) resolvedSymbol = krMatch;

      let json = await apiFetch(API.quote(resolvedSymbol));
      let result = json?.chart?.result?.[0];

      if (!result) {
        const searchJson = await apiFetch(API.search(raw));
        const first = (searchJson?.quotes ?? []).find(q => q.symbol);
        if (first) {
          resolvedSymbol = first.symbol;
          json = await apiFetch(API.quote(resolvedSymbol));
          result = json?.chart?.result?.[0];
        }
      }

      if (!result) {
        throw new Error(`"${escHtml(raw)}" 에 해당하는 종목을 찾을 수 없습니다.`);
      }

      input.value = resolvedSymbol;
      renderCard(result.meta, resolvedSymbol);
      addHistory(resolvedSymbol);

    } catch (e) {
      errorMsg.textContent = e.message || '오류가 발생했습니다.';
    } finally {
      spinner.style.display = 'none';
      btn.disabled = false;
    }
  }

  function renderCard(meta, symbol) {
    const price      = meta.regularMarketPrice ?? 0;
    const prev       = meta.chartPreviousClose ?? meta.previousClose ?? price;
    const change     = price - prev;
    const changePct  = prev ? (change / prev) * 100 : 0;
    const currency   = meta.currency ?? 'USD';
    const name       = meta.longName || meta.shortName || symbol;
    const exchange   = meta.fullExchangeName || meta.exchangeName || '';
    const dayHigh    = meta.regularMarketDayHigh;
    const dayLow     = meta.regularMarketDayLow;
    const open       = meta.regularMarketOpen;
    const vol        = meta.regularMarketVolume;
    const cap52H     = meta.fiftyTwoWeekHigh;
    const cap52L     = meta.fiftyTwoWeekLow;

    const dir = change > 0 ? 'up' : change < 0 ? 'down' : 'flat';
    const arrow = change > 0 ? '▲' : change < 0 ? '▼' : '─';

    const fmt = (n, d=2) => n != null ? n.toLocaleString('ko-KR', {minimumFractionDigits:d, maximumFractionDigits:d}) : '-';
    const fmtVol = n => n != null ? (n >= 1e8 ? (n/1e8).toFixed(1)+'억' : n >= 1e4 ? (n/1e4).toFixed(0)+'만' : n.toLocaleString()) : '-';
    const now = new Date().toLocaleString('ko-KR', {hour:'2-digit', minute:'2-digit', second:'2-digit'});

    card.innerHTML = `
      <div class="card">
        <div class="card-header">
          <div>
            <div class="stock-name">${escHtml(name)}</div>
            <div class="stock-symbol">${escHtml(symbol)} <span class="market-badge">${escHtml(exchange)}</span></div>
          </div>
          <div class="price-block">
            <div class="price ${dir}">${fmt(price)} <small style="font-size:0.5em;font-weight:400">${escHtml(currency)}</small></div>
            <div class="change ${dir}">${arrow} ${fmt(Math.abs(change))} (${changePct >= 0 ? '+' : ''}${changePct.toFixed(2)}%)</div>
          </div>
        </div>
        <div class="divider"></div>
        <div class="stats">
          <div class="stat-item"><label>시가</label><span>${fmt(open)}</span></div>
          <div class="stat-item"><label>전일 종가</label><span>${fmt(prev)}</span></div>
          <div class="stat-item"><label>당일 고가</label><span class="up">${fmt(dayHigh)}</span></div>
          <div class="stat-item"><label>당일 저가</label><span class="down">${fmt(dayLow)}</span></div>
          <div class="stat-item"><label>52주 최고</label><span>${fmt(cap52H)}</span></div>
          <div class="stat-item"><label>52주 최저</label><span>${fmt(cap52L)}</span></div>
          <div class="stat-item"><label>거래량</label><span>${fmtVol(vol)}</span></div>
          <div class="stat-item"><label>통화</label><span>${escHtml(currency)}</span></div>
        </div>
        <div class="timestamp">기준 시각: ${now}</div>
      </div>`;
  }

  function escHtml(s) {
    return String(s ?? '')
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;')
      .replace(/'/g,'&#39;');   // [C-1] 단따옴표 이스케이프 추가
  }

  // [C-1] 히스토리: data-symbol 속성 + addEventListener (XSS 방지)
  function addHistory(symbol) {
    history = [symbol, ...history.filter(s => s !== symbol)].slice(0, 8);
    localStorage.setItem('stock_history', JSON.stringify(history));
    renderHistory();
  }

  function renderHistory() {
    const section = document.getElementById('history-section');
    const list    = document.getElementById('history-list');
    if (!history.length) { section.style.display = 'none'; return; }
    section.style.display = 'block';
    list.innerHTML = history.map(s =>
      `<span class="history-item" data-symbol="${escHtml(s)}">${escHtml(s)}</span>`
    ).join('');
    list.querySelectorAll('.history-item[data-symbol]').forEach(el => {
      el.addEventListener('click', () => quickSearch(el.dataset.symbol));
    });
  }
</script>
</body>
</html>
