<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>주가 검색</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Segoe UI', sans-serif;
      background: #F7F8FA;
      color: #191F28;
      min-height: 100vh;
    }

    /* ── 헤더 ── */
    .header {
      background: #fff;
      border-bottom: 1px solid #E8ECF0;
      padding: 0 20px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 8px;
      position: sticky;
      top: 0;
      z-index: 200;
    }

    .header-logo {
      width: 28px;
      height: 28px;
      background: #3182F6;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -1px;
      flex-shrink: 0;
    }

    .header-title {
      font-size: 1rem;
      font-weight: 700;
      color: #191F28;
      letter-spacing: -0.3px;
    }

    /* ── 메인 컨테이너 ── */
    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 16px 16px 40px;
    }

    /* ── 검색창 ── */
    .search-wrap {
      position: relative;
      margin-bottom: 12px;
    }

    .search-inner {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #8B95A1;
      pointer-events: none;
      font-size: 16px;
    }

    input#ticker-input {
      flex: 1;
      padding: 13px 14px 13px 40px;
      border-radius: 12px;
      border: 1.5px solid #E8ECF0;
      background: #fff;
      color: #191F28;
      font-size: 0.95rem;
      font-weight: 500;
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }

    input#ticker-input:focus {
      border-color: #3182F6;
    }

    input#ticker-input::placeholder { color: #B0B8C1; }

    #search-btn {
      flex-shrink: 0;
      padding: 13px 18px;
      border-radius: 12px;
      border: none;
      background: #3182F6;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
      letter-spacing: -0.2px;
    }

    #search-btn:hover  { background: #1B64DA; }
    #search-btn:active { background: #1353C2; }
    #search-btn:disabled { background: #C9D3DF; cursor: not-allowed; }

    /* ── 자동완성 ── */
    #suggest-box {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: #fff;
      border: 1.5px solid #E8ECF0;
      border-radius: 12px;
      overflow: hidden;
      z-index: 100;
      display: none;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .suggest-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 11px 14px;
      cursor: pointer;
      transition: background 0.1s;
      gap: 12px;
      border-bottom: 1px solid #F2F4F6;
    }

    .suggest-item:last-child { border-bottom: none; }

    .suggest-item:hover, .suggest-item.active {
      background: #F7F8FA;
    }

    .suggest-left { display: flex; flex-direction: column; min-width: 0; }

    .suggest-name {
      font-size: 0.875rem;
      font-weight: 600;
      color: #191F28;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .suggest-symbol {
      font-size: 0.75rem;
      color: #8B95A1;
      margin-top: 1px;
    }

    .suggest-type {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 6px;
      background: #F2F4F6;
      color: #8B95A1;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── 퀵칩 (가로 스크롤) ── */
    .chips-wrap {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 2px;
      margin-bottom: 16px;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .chips-wrap::-webkit-scrollbar { display: none; }

    .chip {
      flex-shrink: 0;
      padding: 6px 12px;
      border-radius: 8px;
      border: 1.5px solid #E8ECF0;
      background: #fff;
      color: #4E5968;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .chip:hover {
      border-color: #3182F6;
      color: #3182F6;
      background: #EFF6FF;
    }

    /* ── 에러 ── */
    #error-msg {
      font-size: 0.85rem;
      color: #E5344A;
      text-align: center;
      margin-bottom: 8px;
      font-weight: 500;
    }

    /* ── 스피너 ── */
    .spinner {
      display: none;
      width: 22px;
      height: 22px;
      border: 2.5px solid #E8ECF0;
      border-top-color: #3182F6;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 20px auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 결과 카드 ── */
    .card {
      background: #fff;
      border-radius: 16px;
      border: 1px solid #E8ECF0;
      overflow: hidden;
      animation: fadeUp 0.2s ease;
      margin-bottom: 12px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-top {
      padding: 18px 18px 0;
    }

    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .stock-name {
      font-size: 1rem;
      font-weight: 700;
      color: #191F28;
      line-height: 1.3;
    }

    .stock-symbol-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 3px;
    }

    .stock-symbol {
      font-size: 0.78rem;
      color: #8B95A1;
      font-weight: 500;
    }

    .market-badge {
      font-size: 0.68rem;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 5px;
      background: #F2F4F6;
      color: #8B95A1;
    }

    .price-block { text-align: right; }

    .price {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1.1;
    }

    .change {
      font-size: 0.82rem;
      font-weight: 600;
      margin-top: 3px;
    }

    /* 한국식: 상승=빨강, 하락=파랑 */
    .up   { color: #E5344A; }
    .down { color: #2563EB; }
    .flat { color: #8B95A1; }

    /* ── 통계 그리드 ── */
    .card-divider {
      height: 1px;
      background: #F2F4F6;
      margin: 14px 18px 0;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      padding: 0 18px 6px;
    }

    .stat-item {
      padding: 10px 0;
      border-bottom: 1px solid #F2F4F6;
    }

    .stat-item:nth-last-child(-n+2) { border-bottom: none; }

    .stat-item:nth-child(odd)  { padding-right: 12px; border-right: 1px solid #F2F4F6; }
    .stat-item:nth-child(even) { padding-left: 12px; }

    .stat-label {
      font-size: 0.72rem;
      color: #8B95A1;
      font-weight: 500;
      margin-bottom: 3px;
    }

    .stat-value {
      font-size: 0.9rem;
      font-weight: 700;
      color: #191F28;
    }

    .card-footer {
      padding: 8px 18px 14px;
      font-size: 0.72rem;
      color: #B0B8C1;
      text-align: right;
    }

    /* ── 최근 검색 ── */
    .history-section {
      margin-top: 4px;
    }

    .history-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #8B95A1;
      margin-bottom: 8px;
      letter-spacing: 0.02em;
    }

    .history-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .history-item {
      padding: 5px 11px;
      border-radius: 8px;
      background: #fff;
      border: 1.5px solid #E8ECF0;
      font-size: 0.8rem;
      font-weight: 600;
      color: #4E5968;
      cursor: pointer;
      transition: all 0.15s;
    }

    .history-item:hover {
      border-color: #3182F6;
      color: #3182F6;
    }
  </style>
</head>
<body>

<!-- 헤더 -->
<header class="header">
  <div class="header-logo">주</div>
  <span class="header-title">주가 검색</span>
</header>

<!-- 본문 -->
<main class="container">

  <!-- 검색창 -->
  <div class="search-wrap" style="position:relative;">
    <div class="search-inner">
      <span class="search-icon">🔍</span>
      <input id="ticker-input" type="text"
        placeholder="종목명 또는 티커 (예: 삼성전자, AAPL)"
        maxlength="40" autocomplete="off" />
      <button id="search-btn">검색</button>
    </div>
    <div id="suggest-box"></div>
  </div>

  <!-- 퀵칩 -->
  <div class="chips-wrap">
    <span class="chip" data-symbol="AAPL">🍎 Apple</span>
    <span class="chip" data-symbol="TSLA">⚡ Tesla</span>
    <span class="chip" data-symbol="NVDA">🟢 Nvidia</span>
    <span class="chip" data-symbol="MSFT">🪟 Microsoft</span>
    <span class="chip" data-symbol="005930.KS">📱 삼성전자</span>
    <span class="chip" data-symbol="000660.KS">💾 SK하이닉스</span>
    <span class="chip" data-symbol="035420.KS">🔍 NAVER</span>
    <span class="chip" data-symbol="BTC-USD">₿ Bitcoin</span>
  </div>

  <!-- 상태 -->
  <div id="spinner" class="spinner"></div>
  <div id="error-msg"></div>
  <div id="result-card"></div>

  <!-- 최근 검색 -->
  <div id="history-section" class="history-section" style="display:none">
    <p class="history-label">최근 검색</p>
    <div id="history-list" class="history-list"></div>
  </div>

</main>

<script>
  const input    = document.getElementById('ticker-input');
  const btn      = document.getElementById('search-btn');
  const spinner  = document.getElementById('spinner');
  const errorMsg = document.getElementById('error-msg');
  const card     = document.getElementById('result-card');
  const suggestBox = document.getElementById('suggest-box');

  let history = JSON.parse(localStorage.getItem('stock_history') || '[]');
  let suggestItems = [];
  let activeIdx = -1;
  let suggestTimer = null;

  btn.addEventListener('click', () => search());

  document.querySelectorAll('.chip[data-symbol]').forEach(el => {
    el.addEventListener('click', () => quickSearch(el.dataset.symbol));
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter')     { closeSuggest(); search(); return; }
    if (e.key === 'ArrowDown') { e.preventDefault(); moveActive(1); return; }
    if (e.key === 'ArrowUp')   { e.preventDefault(); moveActive(-1); return; }
    if (e.key === 'Escape')    { closeSuggest(); return; }
  });

  input.addEventListener('input', () => {
    clearTimeout(suggestTimer);
    const q = input.value.trim();
    if (q.length < 1) { closeSuggest(); return; }
    suggestTimer = setTimeout(() => fetchSuggest(q), 250);
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.search-wrap')) closeSuggest();
  });

  renderHistory();

  // ── 한국 종목 매핑 ────────────────────────────────────────
  const KR_MAP = {

    '한온시스템':'018880.KS','hl만도':'204320.KS',
    'lg에너지솔루션':'373220.KS','lg엔솔':'373220.KS',
    'lg화학':'051910.KS','sk이노베이션':'096770.KS',
    'sk아이이테크놀로지':'361610.KS','skiet':'361610.KS',
    '에코프로비엠':'247540.KQ','에코프로':'086520.KQ',
    '포스코퓨처엠':'003670.KS','일진머티리얼즈':'020150.KS',
    '천보':'278280.KQ','포스코':'005490.KS','posco':'005490.KS',
    '포스코홀딩스':'005490.KS','현대제철':'004020.KS',
    '고려아연':'010130.KS','영풍':'000670.KS','oci':'010060.KS',
    'sk텔레콤':'017670.KS','skt':'017670.KS',
    'kt':'030200.KS','lg유플러스':'032640.KS','lgu+':'032640.KS',
    'lg전자':'066570.KS','hd현대일렉트릭':'267260.KS',
    'kb금융':'105560.KS','kb':'105560.KS',
    '신한지주':'055550.KS','신한':'055550.KS',

    'hd현대':'267250.KS','두산':'000150.KS',
    '두산에너빌리티':'034020.KS','두산밥캣':'241560.KS',

    '롯데쇼핑':'023530.KS','현대백화점':'069960.KS',
    'cj제일제당':'097950.KS','cj':'001040.KS',
    'cj대한통운':'000120.KS','농심':'004370.KS',
    '오리온':'271560.KS','하이트진로':'000080.KS',
    'kt&g':'033780.KS','아모레퍼시픽':'090430.KS',
    'lg생활건강':'051900.KS','대한항공':'003490.KS',
    '아시아나항공':'020560.KS','제주항공':'089590.KS',
    'hmm':'011200.KS','현대상선':'011200.KS',
    '엔씨소프트':'036570.KS','엔씨':'036570.KS',
    '넷마블':'251270.KS','크래프톤':'259960.KS',
    '하이브':'352820.KS','빅히트':'352820.KS',
    'sm엔터테인먼트':'041510.KQ','jyp엔터테인먼트':'035900.KQ',
    'yg엔터테인먼트':'122870.KQ',
    '삼성바이오로직스':'207940.KS','셀트리온':'068270.KS',
    '유한양행':'000100.KS','한미약품':'128940.KS',
    '녹십자':'006280.KS','종근당':'001630.KS',
    'hlb':'028300.KQ','알테오젠':'196170.KQ',
    '한국타이어':'161390.KS','금호타이어':'073240.KS',
    '롯데케미칼':'011170.KS','s-oil':'010950.KS',
    '애플':'AAPL','테슬라':'TSLA','엔비디아':'NVDA',
    '마이크로소프트':'MSFT','구글':'GOOGL','알파벳':'GOOGL',
    '아마존':'AMZN','메타':'META','넷플릭스':'NFLX',
    '팔란티어':'PLTR',
    '비트코인':'BTC-USD','이더리움':'ETH-USD','리플':'XRP-USD',
    '솔라나':'SOL-USD','도지코인':'DOGE-USD',
  };

  function hasKorean(s) { return /[\uac00-\ud7a3]/.test(s); }

  function lookupKrMap(q) {
    const key = q.toLowerCase().replace(/\s+/g, '');
    return KR_MAP[key] ?? null;
  }

  // ── API 엔드포인트 ────────────────────────────────────────
  const API = {
    quote:  symbol => `/api/quote/${encodeURIComponent(symbol)}`,
    search: q      => `/api/search?q=${encodeURIComponent(q)}`,
  };

  function fetchWithTimeout(url, ms = 8000) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), ms);
    return fetch(url, { signal: controller.signal }).finally(() => clearTimeout(timer));
  }

  async function apiFetch(url) {
    const res = await fetchWithTimeout(url, 8000);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  async function fetchSuggest(q) {
    try {
      const json = await apiFetch(API.search(q));
      suggestItems = (json?.quotes ?? []).filter(it => it.symbol);
      renderSuggest();
    } catch (e) {
      console.warn('[suggest]', e);
    }
  }

  function renderSuggest() {
    if (!suggestItems.length) { closeSuggest(); return; }
    activeIdx = -1;
    suggestBox.style.display = 'block';
    suggestBox.innerHTML = suggestItems.map((it, i) => {
      const name = it.longname || it.shortname || it.symbol;
      const typeLabel = {
        EQUITY:'주식', ETF:'ETF', MUTUALFUND:'펀드',
        CRYPTOCURRENCY:'암호화폐', INDEX:'지수', FUTURE:'선물', CURRENCY:'통화'
      }[it.quoteType] || it.quoteType || '';
      return `<div class="suggest-item" data-i="${i}">
        <div class="suggest-left">
          <span class="suggest-name">${escHtml(name)}</span>
          <span class="suggest-symbol">${escHtml(it.symbol)} · ${escHtml(it.exchange||'')}</span>
        </div>
        <span class="suggest-type">${escHtml(typeLabel)}</span>
      </div>`;
    }).join('');
    suggestBox.querySelectorAll('.suggest-item').forEach(el => {
      el.addEventListener('mousedown', () => pickSuggest(Number(el.dataset.i)));
    });
  }

  function moveActive(dir) {
    if (!suggestItems.length) return;
    activeIdx = Math.max(-1, Math.min(suggestItems.length - 1, activeIdx + dir));
    [...suggestBox.querySelectorAll('.suggest-item')].forEach((el, i) =>
      el.classList.toggle('active', i === activeIdx));
    if (activeIdx >= 0) input.value = suggestItems[activeIdx].symbol;
  }

  function pickSuggest(i) {
    input.value = suggestItems[i].symbol;
    closeSuggest();
    search();
  }

  function closeSuggest() {
    suggestBox.style.display = 'none';
    suggestItems = [];
    activeIdx = -1;
  }

  function quickSearch(symbol) {
    input.value = symbol;
    closeSuggest();
    search();
  }

  async function search() {
    const raw = input.value.trim();
    if (!raw) return;

    card.innerHTML = '';
    errorMsg.textContent = '';
    spinner.style.display = 'block';
    btn.disabled = true;

    try {
      let resolvedSymbol = raw.toUpperCase();

      const krMatch = lookupKrMap(raw);
      if (krMatch) resolvedSymbol = krMatch;

      let json = await apiFetch(API.quote(resolvedSymbol));
      let result = json?.chart?.result?.[0];

      if (!result) {
        const searchJson = await apiFetch(API.search(raw));
        const first = (searchJson?.quotes ?? []).find(q => q.symbol);
        if (first) {
          resolvedSymbol = first.symbol;
          json = await apiFetch(API.quote(resolvedSymbol));
          result = json?.chart?.result?.[0];
        }
      }

      if (!result) throw new Error(`"${escHtml(raw)}" 에 해당하는 종목을 찾을 수 없습니다.`);

      input.value = resolvedSymbol;
      renderCard(result.meta, resolvedSymbol);
      addHistory(resolvedSymbol);

    } catch (e) {
      errorMsg.textContent = e.message || '오류가 발생했습니다.';
    } finally {
      spinner.style.display = 'none';
      btn.disabled = false;
    }
  }

  function renderCard(meta, symbol) {
    const price     = meta.regularMarketPrice ?? 0;
    const prev      = meta.chartPreviousClose ?? meta.previousClose ?? price;
    const change    = price - prev;
    const changePct = prev ? (change / prev) * 100 : 0;
    const currency  = meta.currency ?? 'USD';
    const name      = meta.longName || meta.shortName || symbol;
    const exchange  = meta.fullExchangeName || meta.exchangeName || '';
    const dayHigh   = meta.regularMarketDayHigh;
    const dayLow    = meta.regularMarketDayLow;
    const open      = meta.regularMarketOpen;
    const vol       = meta.regularMarketVolume;
    const w52H      = meta.fiftyTwoWeekHigh;
    const w52L      = meta.fiftyTwoWeekLow;

    // 한국식: 상승=빨강(up), 하락=파랑(down)
    const dir   = change > 0 ? 'up' : change < 0 ? 'down' : 'flat';
    const arrow = change > 0 ? '▲' : change < 0 ? '▼' : '─';

    const fmt    = (n, d=2) => n != null ? n.toLocaleString('ko-KR', {minimumFractionDigits:d, maximumFractionDigits:d}) : '-';
    const fmtVol = n => n != null ? (n >= 1e8 ? (n/1e8).toFixed(1)+'억' : n >= 1e4 ? (n/1e4).toFixed(0)+'만' : n.toLocaleString()) : '-';
    const now    = new Date().toLocaleString('ko-KR', {hour:'2-digit', minute:'2-digit', second:'2-digit'});

    card.innerHTML = `
      <div class="card">
        <div class="card-top">
          <div class="card-meta">
            <div>
              <div class="stock-name">${escHtml(name)}</div>
              <div class="stock-symbol-row">
                <span class="stock-symbol">${escHtml(symbol)}</span>
                <span class="market-badge">${escHtml(exchange)}</span>
              </div>
            </div>
            <div class="price-block">
              <div class="price ${dir}">${fmt(price)}<span style="font-size:0.45em;font-weight:500;margin-left:3px">${escHtml(currency)}</span></div>
              <div class="change ${dir}">${arrow} ${fmt(Math.abs(change))} (${changePct >= 0 ? '+' : ''}${changePct.toFixed(2)}%)</div>
            </div>
          </div>
        </div>
        <div class="card-divider"></div>
        <div class="stats">
          <div class="stat-item">
            <div class="stat-label">시가</div>
            <div class="stat-value">${fmt(open)}</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">전일 종가</div>
            <div class="stat-value">${fmt(prev)}</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">당일 고가</div>
            <div class="stat-value up">${fmt(dayHigh)}</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">당일 저가</div>
            <div class="stat-value down">${fmt(dayLow)}</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">52주 최고</div>
            <div class="stat-value">${fmt(w52H)}</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">52주 최저</div>
            <div class="stat-value">${fmt(w52L)}</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">거래량</div>
            <div class="stat-value">${fmtVol(vol)}</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">통화</div>
            <div class="stat-value">${escHtml(currency)}</div>
          </div>
        </div>
        <div class="card-footer">기준 ${now}</div>
      </div>`;
  }

  function escHtml(s) {
    return String(s ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function addHistory(symbol) {
    history = [symbol, ...history.filter(s => s !== symbol)].slice(0, 8);
    localStorage.setItem('stock_history', JSON.stringify(history));
    renderHistory();
  }

  function renderHistory() {
    const section = document.getElementById('history-section');
    const list    = document.getElementById('history-list');
    if (!history.length) { section.style.display = 'none'; return; }
    section.style.display = 'block';
    list.innerHTML = history.map(s =>
      `<span class="history-item" data-symbol="${escHtml(s)}">${escHtml(s)}</span>`
    ).join('');
    list.querySelectorAll('.history-item[data-symbol]').forEach(el => {
      el.addEventListener('click', () => quickSearch(el.dataset.symbol));
    });
  }
</script>
</body>
</html>
